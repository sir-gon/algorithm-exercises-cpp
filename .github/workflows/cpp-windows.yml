---
name: C/C++ CMake/MSVC Windows CI Test

on: # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: C/C++ CMake CI Test
    strategy:
      matrix:
        os:
          - "windows-2022"
          - "windows-2025"
        arch:
          - amd64
          - amd64_x86
          # - amd64_arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install
        shell: bash
        run: |
          echo "VCPKG_ROOT=C:/vcpkg" >> $GITHUB_ENV

      - name: Check Tools
        run: |
          echo "-----------"
          c++ --version
          echo "-----------"
          make --version
          echo "-----------"
          cmake --version
          echo "-----------"
          vcpkg --version
          echo "-----------"

      # yamllint disable rule:line-length
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: ${{ matrix.arch }}
      # yamllint enable rule:line-length
      - name: Install dependencies
        run: |
          vcpkg --x-wait-for-lock integrate install
          vcpkg --x-wait-for-lock install

      - name: Pre Build
        run: >
          cmake.exe
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -S${{ github.workspace }}
          -B${{ github.workspace }}/build/default -G "MinGW Makefiles"

      - name: Build
        run: |
          cmake --build build/default

      - name: Test
        run: >
          ctest
          -C Debug
          -T test
          --rerun-failed
          --output-on-failure
          --test-dir ${{ github.workspace }}/build/default
