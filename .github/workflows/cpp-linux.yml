---
name: C/C++ CMake/GNU Linux CI Test

on: # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: C/C++ CMake CI Test
    strategy:
      matrix:
        os:
          - "ubuntu-24.04"
          - "ubuntu-24.04-arm"
          - "ubuntu-26.04"
          - "ubuntu-26.04-arm"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install
        shell: bash
        run: |
          echo "VCPKG_ROOT=/usr/local/share/vcpkg" >> $GITHUB_ENV

      - name: Check Tools
        run: |
          echo "-----------"
          c++ --version
          echo "-----------"
          make --version
          echo "-----------"
          cmake --version
          echo "-----------"
          vcpkg --version
          echo "-----------"

      - name: Install dependencies
        run: |
          make dependencies

      - name: Build
        run: |
          make build

      - name: Test
        run: |
          make test
